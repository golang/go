!sum
- go: GaloisFieldAffineTransform
  commutative: false
  documentation: !string |-
    // NAME returns the affine transformation A * x + b in GF(2^8).
    // Each element of A is interpreted as an 8x8 matrix of bits.
    // Each element of x is interpreted as an 8-element vector of bits.
    // The b argument is likewise an 8-element vector of bits.
    // The result is z[i] = A[i/8] * x[i] + b, where * and + are performed in GF2.
- go: GaloisFieldAffineTransformInverse
  commutative: false
  documentation: !string |-
    // NAME returns the affine transformation A * (x⁻¹ mod P) + b in GF(2^8),
    // where the characteristic polynomial P is x^8 + x^4 + x^3 + x + 1.
    // Each element of A is interpreted as an 8x8 matrix of bits.
    // Each element of x is interpreted as an 8-element vector of bits.
    // The b argument is likewise an 8-element vector of bits.
    // The result is z[i] = A[i/8] * inv(x[i]) + b, where * and + are performed in GF2.
- go: GaloisFieldMul
  commutative: false
  documentation: !string |-
    // NAME returns (x * y) mod P, performed in GF(2^8),
    // where the characteristic polynomial P is x^8 + x^4 + x^3 + x + 1.
- go: carrylessMultiply
  commutative: false

- go: carrylessMultiplyWidenLo
  commutative: true
  documentation: !string |-
    // NAME returns the carryless (polynomial) product of the low halves
    // of x and y.
    //
    // A carryless multiplication uses bitwise XOR instead of
    // add-with-carry, for example (in base two):
    //
    //	11 * 11 = 11 * (10 ^ 1) = (11 * 10) ^ (11 * 1) = 110 ^ 11 = 101
    //
    // This also models multiplication of polynomials with coefficients
    // from GF(2) -- 11 * 11 models (x+1)*(x+1) = x**2 + (1^1)x + 1 =
    // x**2 + 0x + 1 = x**2 + 1 modeled by 101.  (Note that "+" adds
    // polynomial terms, but coefficients "add" with XOR.)

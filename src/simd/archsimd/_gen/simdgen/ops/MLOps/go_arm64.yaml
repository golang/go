!sum

# VMLA: Vd = Vn*Vm + Vd
- go: MulAdd
  asm: "VMLA"
  specialLower: !string "earlymatch (%g x y z) => (VMLA%a z x y)"
  documentation: !string |-
    // NAME computes (x * y) + z.
  in:
  - &int
    go: $t
    base: int|uint
  - *int
  - *int
  out:
  - *int

# VFMLA: Vd = Vn*Vm + Vd
- go: MulAdd
  asm: "VFMLA"
  specialLower: !string "earlymatch (%g x y z) => (VFMLA%a z x y)"
  documentation: !string |-
    // NAME performs a fused (x * y) + z.
  in:
  - &fp
    go: $t
    base: float
  - *fp
  - *fp
  out:
  - *fp

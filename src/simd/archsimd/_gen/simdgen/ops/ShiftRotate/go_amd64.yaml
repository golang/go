  in:
  - *any
  - *any
  - *pureImm
  out:
  - *any
- go: ShiftAllRightConcatMod32
  nameAndSizeCheck: true
  asm: "VPSHRDD"
  operandOrder: 2I
  in:
  - *any
  - *any
  - *pureImm
  out:
  - *any
- go: ShiftLeftConcatMod32
  nameAndSizeCheck: true
  asm: "VPSHLDVD"
  in:
  - go: $t
  - go: $t
  - base: uint
    name: shift
  out:
  - go: $t
- go: ShiftRightConcatMod32
  nameAndSizeCheck: true
  asm: "VPSHRDVD"
  in:
  - go: $t
  - go: $t
  - base: uint
    name: shift
  out:

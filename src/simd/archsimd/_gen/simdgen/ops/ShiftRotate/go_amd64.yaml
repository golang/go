- go: ShiftAllLeftConcatMod64
  nameAndSizeCheck: true
  asm: "VPSHLDQ"
  operandOrder: 2I
  in:
  - *any
  - *any
  - *pureImm
  out:
  - *any
- go: ShiftAllRightConcatMod64
  nameAndSizeCheck: true
  asm: "VPSHRDQ"
  operandOrder: 2I
  in:
  - *any
  - *any
  - *pureImm
  out:
  - *any
- go: ShiftLeftConcatMod64
  nameAndSizeCheck: true
  asm: "VPSHLDVQ"
  in:
  - go: $t
  - go: $t
  - base: uint
    name: shift
  out:
  - go: $t
- go: ShiftRightConcatMod64
  nameAndSizeCheck: true
  asm: "VPSHRDVQ"

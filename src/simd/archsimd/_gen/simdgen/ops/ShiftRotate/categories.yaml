!sum
- go: ShiftAllLeft
  nameAndSizeCheck: true
  specialLower: sftimm
  commutative: false
  documentation: !string |-
    // NAME shifts each element of x left by y bits.
    // If y is greater than the element width, the result is 0.
- go: ShiftAllRight
  signed: false
  nameAndSizeCheck: true
  specialLower: sftimm
  commutative: false
  documentation: !string |-
    // NAME logically shifts each element of x right by y bits.
    // If y is greater than the element width, the result is 0.
- go: ShiftAllRight
  signed: true
  specialLower: sftimm
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME arithmetically shifts each element of x right by y bits.
    // If y is greater than the element width, the result is 0 or -1.
- go: shiftAllLeftConst # no APIs, only ssa ops.
  noTypes: "true"
  noGenericOps: "true"
  SSAVariant: "const" # to avoid its name colliding with reg version of this instruction, amend this to its ssa op name.
  nameAndSizeCheck: true
  commutative: false
  specialLower: "if a==0 => x"
- go: shiftAllRightConst # no APIs, only ssa ops.
  noTypes: "true"
  noGenericOps: "true"
  SSAVariant: "const"
  signed: false
  nameAndSizeCheck: true
  commutative: false
  specialLower: "if a==0 => x"
- go: shiftAllRightConst # no APIs, only ssa ops.
  noTypes: "true"
  noGenericOps: "true"
  SSAVariant: "const"
  signed: true
  nameAndSizeCheck: true
  commutative: false
  specialLower: "if a==0 => x"

- go: ShiftLeft
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME shifts x[i] left by y[i] bits.
    // If y[i] is greater than the element width, the result is 0.
- go: ShiftRight
  signed: false
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME logically shifts x[i] right by y[i] bits.
    // If y[i] is greater than the element width, the result is 0.
- go: ShiftRight
  signed: true
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME arithmetically shifts x[i] right by y[i] bits.
    // If y[i] is greater than the element width, the result is 0 or -1.
- go: RotateAllLeft
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME rotates each element to the left by the number of bits specified by shift.
- go: RotateLeft
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME rotates each element in x to the left by the number of bits specified by y's corresponding elements.
- go: RotateAllRight
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME rotates each element to the right by the number of bits specified by shift.
- go: RotateRight
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME rotates each element in x to the right by the number of bits specified by y's corresponding elements.
- go: ShiftAllLeftConcat
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME shifts x[i] left by shift%32, filing any empted lower bits
    // with the high bits of y[i].
    //
    //    z[i] = concat(x[i], y[i]) << (shift%32 - 32)
- go: ShiftAllRightConcat
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME shifts x[i] right by shift%32, filling any emptied upper bits
    // with the low bits of y[i].
    //
    //    z[i] = concat(y[i], x[i]) >> (shift%32)
- go: ShiftLeftConcat
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME shifts x[i] left by shift[i]%32, filing any empted lower bits
    // with the high bits of y[i].
    //
    //    z[i] = concat(x[i], y[i]) << (shift[i]%32 - 32)
- go: ShiftRightConcat
  nameAndSizeCheck: true
  commutative: false
  documentation: !string |-
    // NAME shifts x[i] right by shift[i]%32, filling any emptied upper bits
    // with the low bits of y[i].
    //
    //    z[i] = concat(y[i], x[i]) >> (shift[i]%32)

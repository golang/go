!sum

# GetElem VMOV (UMOV, integer)
- go: GetElem
  asm: "VMOV"
  SSAVariant: "extr"
  in:
  - &immIndex
    class: immediate
    go: Immediate
    name: index
  - &vector
    go: $t
    base: int|uint
  out:
  - &scalar
    class: greg

# GetElem VDUP (duplicate element into scalar float in vreg)
- go: GetElem
  asm: "VDUP"
  SSAVariant: "extr"
  in:
  - *immIndex
  - &fvector
    go: $t
    base: float
  out:
  - &fscalarOut
    class: vreg
    treatLikeAScalarOfSize: 0
    OverwriteClass: greg
    OverwriteBase: float

# SetElem VMOV (INS, integer)
- go: SetElem
  asm: "VMOV"
  SSAVariant: "ins"
  in:
  - *immIndex
  - *vector
  - *scalar
  out:
  - *vector

# SetElem VMOV (float: INS from the lane 0 of the source)
- go: SetElem
  asm: "VMOV"
  SSAVariant: "ins0"
  in:
  - *immIndex
  - &imm0
    class: immediate
    go: Immediate
    const: 0 # imm+vreg with treatLikeAScalarOfSize are treated as scalar in lane 0
  - *fvector
  - &fscalarIn
    class: vreg
    treatLikeAScalarOfSize: 0
  out:
  - *fvector

# broadcast1To16 VDUP (duplicate element 0 to all 16 byte lanes)
- go: broadcast1To16
  asm: "VDUP"
  SSAVariant: "bcast"
  constImm: 0
  in:
  - &immLane0
    name: "@" # tag "fully constant" (no aux field needed)
    const: 0
    class: immediate
    go: Immediate
  - &bcast8
    go: $t
    bits: 128
    elemBits: 8
  out:
  - *bcast8

# broadcast1To8 VDUP (duplicate element 0 to all 8 halfword lanes)
- go: broadcast1To8
  asm: "VDUP"
  SSAVariant: "bcast"
  constImm: 0
  in:
  - *immLane0
  - &bcast16
    go: $t
    bits: 128
    elemBits: 16
  out:
  - *bcast16

# broadcast1To4 VDUP (duplicate element 0 to all 4 word lanes)
- go: broadcast1To4
  asm: "VDUP"
  SSAVariant: "bcast"
  constImm: 0
  in:
  - *immLane0
  - &bcast32
    go: $t
    bits: 128
    elemBits: 32
  out:
  - *bcast32

# broadcast1To2 VDUP (duplicate element 0 to both doubleword lanes)
- go: broadcast1To2
  asm: "VDUP"
  SSAVariant: "bcast"
  constImm: 0
  in:
  - *immLane0
  - &bcast64
    go: $t
    bits: 128
    elemBits: 64
  out:
  - *bcast64

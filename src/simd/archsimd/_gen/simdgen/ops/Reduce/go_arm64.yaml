!sum

# Sum all elements — VADDV (integer)
- go: ReduceSum
  asm: "VADDV"
  in:
  - &any
    go: $t
    base: int|uint
    elemBits: 8|16|32|64
  out:
  - &scalarOut
    go: $t
    treatLikeAScalarOfSize: 0

# Max of all elements — VSMAXV (signed)
- go: ReduceMax
  signed: true
  asm: "VSMAXV"
  in:
  - &int
    go: $t
    base: int
  out:
  - *scalarOut

# Max of all elements — VUMAXV (unsigned)
- go: ReduceMax
  signed: false
  asm: "VUMAXV"
  in:
  - &uint
    go: $t
    base: uint
  out:
  - *scalarOut

# Max of all elements — VFMAXV (float32)
- go: ReduceMax
  asm: "VFMAXV"
  in:
  - &fp32
    go: $t
    base: float
    elemBits: 32
  out:
  - *scalarOut

# Min of all elements — VSMINV (signed)
- go: ReduceMin
  signed: true
  asm: "VSMINV"
  in:
  - *int
  out:
  - *scalarOut

# Min of all elements — VUMINV (unsigned)
- go: ReduceMin
  signed: false
  asm: "VUMINV"
  in:
  - *uint
  out:
  - *scalarOut

# Min of all elements — VFMINV (float32)
- go: ReduceMin
  asm: "VFMINV"
  in:
  - *fp32
  out:
  - *scalarOut

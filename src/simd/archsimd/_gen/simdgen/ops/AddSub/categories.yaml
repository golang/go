!sum
- go: Add
  commutative: true
  documentation: !string |-
    // NAME adds corresponding elements of two vectors.
- go: AddSaturated
  commutative: true
  documentation: !string |-
    // NAME adds corresponding elements of two vectors with saturation.
- go: Sub
  commutative: false
  documentation: !string |-
    // NAME subtracts corresponding elements of two vectors.
- go: SubSaturated
  commutative: false
  documentation: !string |-
    // NAME subtracts corresponding elements of two vectors with saturation.
- go: ConcatAddPairs
  commutative: false
  out:
  - elemBits: 16|32
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements.
    // For x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0+x1, x2+x3, ..., y0+y1, y2+y3, ...].
- go: ConcatAddPairs
  commutative: false
  out:
  - elemBits: 64
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements.
    // For x = [x0, x1] and y = [y0, y1], the result is [x0+x1, y0+y1].
- go: ConcatSubPairs
  commutative: false
  out:
  - elemBits: 16|32
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements.
    // For x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0-x1, x2-x3, ..., y0-y1, y2-y3, ...].
- go: ConcatSubPairs
  commutative: false
  out:
  - elemBits: 64
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements.
    // For x = [x0, x1] and y = [y0, y1], the result is [x0-x1, y0-y1].
- go: ConcatAddPairsSaturated
  commutative: false
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements with saturation.
    // For x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0+x1, x2+x3, ..., y0+y1, y2+y3, ...].
- go: ConcatSubPairsSaturated
  commutative: false
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements with saturation.
    // For x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0-x1, x2-x3, ..., y0-y1, y2-y3, ...].
- go: ConcatAddPairsGrouped
  commutative: false
  out:
  - elemBits: 16|32
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements.
    // With each 128-bit as a group:
    // for x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0+x1, x2+x3, ..., y0+y1, y2+y3, ...].
- go: ConcatAddPairsGrouped
  commutative: false
  out:
  - elemBits: 64
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements.
    // With each 128-bit as a group:
    // for x = [x0, x1] and y = [y0, y1], the result is [x0+x1, y0+y1].
- go: ConcatSubPairsGrouped
  commutative: false
  out:
  - elemBits: 16|32
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements.
    // With each 128-bit as a group:
    // for x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0-x1, x2-x3, ..., y0-y1, y2-y3, ...].
- go: ConcatSubPairsGrouped
  commutative: false
  out:
  - elemBits: 64
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements.
    // With each 128-bit as a group:
    // for x = [x0, x1] and y = [y0, y1], the result is [x0-x1, y0-y1].
- go: ConcatAddPairsSaturatedGrouped
  commutative: false
  documentation: !string |-
    // NAME horizontally adds adjacent pairs of elements with saturation.
    // With each 128-bit as a group:
    // for x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0+x1, x2+x3, ..., y0+y1, y2+y3, ...].
- go: ConcatSubPairsSaturatedGrouped
  commutative: false
  documentation: !string |-
    // NAME horizontally subtracts adjacent pairs of elements with saturation.
    // With each 128-bit as a group:
    // for x = [x0, x1, x2, x3, ...] and y = [y0, y1, y2, y3, ...], the result is [x0-x1, x2-x3, ..., y0-y1, y2-y3, ...].

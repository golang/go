!sum

- go: TruncToInt8
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: int
      elemBits: 16
  out:
    - base: int
      bits: 128

- go: TruncToUint8
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: uint
      elemBits: 16
  out:
    - base: uint
      bits: 128

- go: TruncToInt16
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: int
      elemBits: 32
  out:
    - base: int
      bits: 128

- go: TruncToUint16
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: uint
      elemBits: 32
  out:
    - base: uint
      bits: 128

- go: TruncToInt32
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: int
      elemBits: 64
  out:
    - base: int
      bits: 128

- go: TruncToUint32
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: uint
      elemBits: 64
  out:
    - base: uint
      bits: 128

# Float -> Int conversions (same-size)
# ISA XML has float→float for FCVTZS_int; use OverwriteBase to correct output type
# float32 -> int32
- go: ConvertToInt32
  asm: "VFCVTZS"
  in:
    - base: float
      elemBits: 32
  out:
    - base: float
      elemBits: 32
      OverwriteBase: int

# float32 -> uint32
- go: ConvertToUint32
  asm: "VFCVTZU"
  in:
    - base: float
      elemBits: 32
  out:
    - base: float
      elemBits: 32
      OverwriteBase: uint

# float64 -> int64
- go: ConvertToInt64
  asm: "VFCVTZS"
  in:
    - base: float
      elemBits: 64
  out:
    - base: float
      elemBits: 64
      OverwriteBase: int

# float64 -> uint64
- go: ConvertToUint64
  asm: "VFCVTZU"
  in:
    - base: float
      elemBits: 64
  out:
    - base: float
      elemBits: 64
      OverwriteBase: uint

# Int -> Float conversions (same-size)
# ISA XML has float→float for SCVTF_int/UCVTF_int; use OverwriteBase to correct input type
# int32 -> float32
- go: ConvertToFloat32
  asm: "VSCVTF"
  in:
    - base: float
      elemBits: 32
      OverwriteBase: int
  out:
    - base: float
      elemBits: 32

# uint32 -> float32
- go: ConvertToFloat32
  asm: "VUCVTF"
  in:
    - base: float
      elemBits: 32
      OverwriteBase: uint
  out:
    - base: float
      elemBits: 32

# int64 -> float64
- go: ConvertToFloat64
  asm: "VSCVTF"
  in:
    - base: float
      elemBits: 64
      OverwriteBase: int
  out:
    - base: float
      elemBits: 64

# uint64 -> float64
- go: ConvertToFloat64
  asm: "VUCVTF"
  in:
    - base: float
      elemBits: 64
      OverwriteBase: uint
  out:
    - base: float
      elemBits: 64

# Float narrow/widen
# float64 -> float32 narrow
- go: ConvertToFloat32
  asm: "VFCVTN"
  hiHalfAsm: "VFCVTN2"
  in:
    - base: float
      elemBits: 64
  out:
    - base: float
      elemBits: 32
      bits: 128

# float32 -> float64 widen
- go: ConvertLo2ToFloat64
  asm: "VFCVTL"
  hiHalfAsm: "VFCVTL2"
  in:
    - base: float
      elemBits: 32
  out:
    - base: float
      elemBits: 64
      bits: 128


!sum

- go: TruncateToInt8
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: int
      elemBits: 16
  out:
    - base: int
      bits: 128

- go: TruncateToUint8
  asm: "VXTN"
  hiHalfAsm: "VXTN2"
  in:
    - base: uint
      elemBits: 16
  out:
    - base: uint
      bits: 128

